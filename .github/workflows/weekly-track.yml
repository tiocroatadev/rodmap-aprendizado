name: Weekly Roadmap Tracker
on:
  workflow_dispatch: # Botão manual para testar

jobs:
  create-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Data
        id: roadmap
        run: |
          # Calcula a semana atual baseada no seu início de 31/Mar/2026
          START_DATE="2026-03-30"
          CURRENT_DATE=$(date +%Y-%m-%d)
          START_SEC=$(date -d "$START_DATE" +%s)
          CURRENT_SEC=$(date -d "$CURRENT_DATE" +%s)
          WEEK_NUM=$(( ($CURRENT_SEC - $START_SEC) / 604800 + 1 ))
          
          echo "num=$WEEK_NUM" >> $GITHUB_OUTPUT
          
          # Tenta pegar o conteúdo do arquivo
          CONTENT=$(grep -i "Week $WEEK_NUM" LEARNING_ROADMAP_2026.md || echo "Sem tarefas específicas para a Semana $WEEK_NUM.")
          echo "text<<EOF" >> $GITHUB_ENV
          echo "$CONTENT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Issue via GitHub CLI
        run: |
          gh issue create \
            --title "🚀 Semana ${{ steps.roadmap.outputs.num }} - Foco: Cloud Architect" \
            --body "${{ env.text }}" \
            --label "weekly-track"
        env:
          GH_TOKEN: ${{ github.token }}
